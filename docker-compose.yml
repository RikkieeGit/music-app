version: "3.9"
services:
  music-api:
    build: .
    container_name: music-api
    restart: always
    ports:
      - "443:8000"
    volumes:
      - ./songs:/app/songs
      - /etc/letsencrypt:/etc/letsencrypt:ro
    command: >
      uvicorn main:app
      --host 0.0.0.0
      --port 8000
      --ssl-keyfile /etc/letsencrypt/live/rikkiee-music.duckdns.org/privkey.pem
      --ssl-certfile /etc/letsencrypt/live/rikkiee-music.duckdns.org/fullchain.pem
